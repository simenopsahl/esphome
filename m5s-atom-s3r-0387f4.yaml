packages:
  # --- COMMON PACKAGES ---
  <<: !include_dir_named common
#  <<: !include_dir_named bluetooth

  # --- BOARD AND MODULES ---
  board: !include board/m5stack_atom_s3r.yaml
  hat: !include board/extension/hat_i2c.yaml
  imu: !include board/module/chip_imu_bmi270.yaml
#  env: !include board/module/hat_env_iii.yaml
  dlight: !include board/module/hat_dlight.yaml

  # --- FEATURE PACKAGES ---
#  combined_env_sensors: !include features/combined_env_sensors.yaml

  # --- GUI PACKAGES ---
  colors: !include gui/themes/colors_night_owl.yaml
  lvgl: !include gui/128x128.yaml

  # --- LVGL WIDGET PACKAGES ---
  room_temperature_widget_sensors: !include { file: gui/widgets/labels/number_sensor.yaml, vars: {
    uid: room_temp_value,
    entity_id: sensor.t22_temperature
  }}

substitutions:
  common:
    log_level: WARN
#    log_baud_rate: "115200"
  device:
    name: m5s-as3r-0387f4
    location: "Storage"
    framework:
      type: esp-idf
  display:
    home_page: page_imu

esphome:
  comment: ${device.model} @ ${device.location}
  name: ${device.name}
  friendly_name: ${device.name}
  area: ${device.location}
  project:
    version: "1.0.0"

wifi:
#  use_address: 192.168.69.64
  use_address: ${device.name}.local
  manual_ip: 
    gateway: 192.168.68.1
    subnet: 255.255.252.0
    static_ip: 192.168.71.64

# --- LVGL CLOCKS ---
time:
  - id: !extend time_homeassistant
    on_time_sync:
      - script.execute: lvgl_time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: lvgl_time_update

binary_sensor:
  - id: !extend btn_display
    on_press:
      - lvgl.page.next

  # Call sensors from HA.
  - platform: homeassistant
    entity_id: binary_sensor.etg2_simen_occupancy
    id: motion1
  - platform: homeassistant
    entity_id: binary_sensor.etg2_gang_occupancy
    id: motion2
  # Turn on display while room is occupied
  - platform: template
    id: motion_detected
    lambda: !lambda |-
      if ( (id(motion1).state) or (id(motion2).state) ) {
        return true;
      } else {
        return false;
      }
    on_state: 
      then:
        - script.execute: display_on_off

display:
  - id: !extend display_lcd
    dimensions:
      offset_height: 191
      offset_width: 110

motion:
  - id: !extend motion_bmi270
    axis_map:
      x: x
      y: "-y"
      z: z

lvgl:
  buffer_size: 40%
  rotation: 180
  style_definitions:
    - id: circle
      radius: circle
      outline_width: 1
      outline_color: c_yellow
      align: center
    - id: dashline
      width: 100%
      height: 100%
      line_dash_width: 4
      line_dash_gap: 4
      line_color: c_yellow
  pages:
    - id: page_imu
      pad_top: 24
      pad_bottom: 0
      on_load:
        - lvgl.label.update:
            id: lbl_page_title
            text: "\U000F0D49" # axis-arrow
      <<: !include
        file: gui/functions/swipe_navigation.yaml
      widgets:
        - obj:
            pad_top: 2
            pad_bottom: 3
            pad_left: 3
            pad_right: 3
            scrollable: false
            width: 100%
            height: 100%
            border_width: 0
            radius: 0
            align: CENTER
            widgets:
              - container:
                  max_height: 66
                  max_width: 66
                  styles: circle
                  bg_color: c_dark_gray
                  bg_opa: cover
                  widgets:
                  - container:
                      styles: circle
                      width: 66%
                      height: 66%
                  - container:
                      styles: circle
                      width: 33%
                      height: 33%
                  - line:
                      styles: dashline
                      points:
                        - 50%,0
                        - 50%,100%
                  - line:
                      styles: dashline
                      points:
                        - {x: 0, y: 50%}
                        - [100%, 50%]
                  - container:
                      styles: circle
                      width: 8%
                      height: 8%
                      bg_color: c_gray
                      bg_opa: 50%
                  - container:
                      id: indicator_container
                      width: 100%
                      height: 100%
                      transform_pivot_x: 50%
                      transform_pivot_y: 50%
                      widgets:
                        - container:
                            id: indicator
                            styles: circle
                            width: 10%
                            height: 10%
                            bg_color: c_red
                            bg_opa: 100%
                            x: 10
                            y: 10
              - label:
                  text: R
                  align: bottom_mid
                  text_font: font_md
                  text_color: c_text_p
              - label:
                  text: F
                  align: top_mid
                  text_font: font_md
                  text_color: c_text_p
              - label:
                  text: L
                  align: left_mid
                  text_font: font_md
                  text_color: c_text_p
              - label:
                  text: R
                  align: right_mid
                  text_font: font_md
                  text_color: c_text_p

script:
  - id: update_motion
    then:
    - if:
        condition:
          lambda: return abs(id(motion_roll).state) < 1.0f && abs(id(motion_pitch).state) < 1.0f;
        then:
          lvgl.widget.update:
            id: indicator
            bg_color: c_green
            x: !lambda return (int)(clamp(id(motion_roll).state, -20.0f, 20.0f) / 20.0f * 35);
            y: !lambda return (int)(clamp(id(motion_pitch).state, -20.0f, 20.0f) / 20.0f * 35);
        else:
          lvgl.widget.update:
            id: indicator
            bg_color: c_red
            x: !lambda return (int)(clamp(id(motion_roll).state, -20.0f, 20.0f) / 20.0f * 35);
            y: !lambda return (int)(clamp(id(motion_pitch).state, -20.0f, 20.0f) / 20.0f * 35);

sensor:
  - id: !extend motion_roll
    on_value:
      script.execute: update_motion

