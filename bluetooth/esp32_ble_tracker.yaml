---
#
# The esp32_ble_tracker component creates a global hub so that you can track
# bluetooth low energy devices using your ESP32 node.
# https://esphome.io/components/esp32_ble_tracker
#
esp32_ble_tracker:
  scan_parameters:
    window: 50ms
    active: false

# Only enable bluetooth proxy on HA connecttion
api:
  on_client_connected:
    - script.execute: ble_tracker_delayed_start
  on_client_disconnected:
    - script.execute: ble_tracker_delayed_stop

script:
  - id: ble_tracker_delayed_start
    mode: single
    then:
      - delay: 45s
      - esp32_ble_tracker.start_scan:
          continuous: true
  - id: ble_tracker_delayed_stop
    mode: single
    then:
      - delay: 5s
      - esp32_ble_tracker.stop_scan:
