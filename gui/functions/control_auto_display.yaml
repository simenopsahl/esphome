# Display auto off

switch:
  # Switch to turn on/off the display auto off feature
  - platform: template
    id: display_auto
    optimistic: true
    restore_mode: ALWAYS_ON
    name: "Display auto off"
    entity_category: config

binary_sensor:
  # Turn on display while room is occupied
  # Default to true
  - platform: template
    id: presence_detected
    lambda: !lambda |-
      return true;
    on_state: 
      then:
        - script.execute: display_on_off

# Script to control the display backlight based on motion detection
script:
  - id: display_on_off
    mode: restart
    then:
      - if:
          condition:
            - binary_sensor.is_on: presence_detected
          then:
            - light.turn_on:
                id: backlight_light
                brightness: 75%
                transition_length: 1s
            - logger.log: "Motion detected. Display on"
          else:
            - if:
                condition:
                  - binary_sensor.is_off: presence_detected
                then:
                  - delay: 15s
                  - light.turn_on:
                      id: backlight_light
                      brightness: 50%
                      transition_length: 10s
                  - logger.log: "Motion NOT detected. Display 50%"
                  - if:
                      condition:
                        - binary_sensor.is_off: presence_detected
                      then:
                        - delay: 30s
                        - light.turn_on:
                            id: backlight_light
                            brightness: 25%
                            transition_length: 10s
                        - logger.log: "Motion NOT detected. Display 25%"
                        - if:
                            condition:
                              and:
                                - binary_sensor.is_off: presence_detected
                                - switch.is_on: display_auto
                            then:
                              - delay: 45s
                              - light.turn_on:
                                  id: backlight_light
                                  brightness: 10%
                                  transition_length: 10s
                              - logger.log: "Motion NOT detected. Display 10%"
                              - if:
                                  condition:
                                    and:
                                      - binary_sensor.is_off: presence_detected
                                      - switch.is_on: display_auto
                                  then:
                                    - delay: 1min
                                    - light.turn_off: backlight_light
                                    - logger.log: "Motion NOT detected. Display off"