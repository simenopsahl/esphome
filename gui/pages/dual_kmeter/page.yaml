# LVGL Dual KMeter thermocouple page

# required vars:
# - *page_styles
# - *container_styles
# - page_title

# Dual KMeter mode page
#lvgl:
#  pages:
    id: page_kmeter
    <<: !include ../../styles/page_styles.yaml
    pad_top: ${page_pad_top}
    pad_bottom: ${page_pad_bottom}
    on_load:
      - lvgl.label.update:
          id: lbl_page_title
          text: ${page_title}
    <<: !include
      file: ../../functions/swipe_navigation.yaml
    widgets:
      - obj:
          <<: !include ../../styles/container_styles.yaml
          pad_top: ${container_pad_top}
          pad_bottom: ${container_pad_bottom}
          pad_left: ${container_pad_left}
          pad_right: ${container_pad_right}
          scrollable: ${container_scrollable}
          align: CENTER
          layout:
            type: FLEX
            flex_flow: ROW
            flex_align_main: SPACE_EVENLY
            flex_align_cross: CENTER
          widgets:
            # --- The Water Tank Graphic ---
            # Wrapped in a transparent obj to isolate the layout engine
            - obj:
                width: ${tank_width}
                height: ${tank_height}
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                # By being a standard rigid obj, the parent's FLEX ROW will center this perfectly.
                widgets:
                  # 1. The Bar Widget (Base Layer)
                  - bar:
                      id: tank_graphic
                      width: 100%
                      height: 100%
                      pad_all: 0
                      radius: ${tank_radius}
                      border_width: 2
                      border_color: c_blue
                      # Cold water background
                      bg_color: c_blue 
                      bg_opa: 90%
                      # Define the scale
                      min_value: ${tank_temp_min}
                      max_value: ${tank_temp_max}
                      # Draw from the top (hot) down to the current value
                      mode: RANGE
                      start_value: ${tank_temp_min}
                      value: ${tank_temp_max} # Default starting state
                      # Hot water indicator
                      indicator:
                        border_width: 2
                        border_color: c_red
                        bg_color: c_red
                        bg_opa: 90%
                        radius: 0
                
                  # 2a. Top Temp Drop Shadow (Rendered first so it sits behind)
                  - label:
                      id: lbl_temp_kmeter2_shadow
                      text: "?"
                      text_font: font_lg
                      text_color: c_black
                      align: TOP_MID
                      # Offset by 2 pixels
                      x: 2
                      y: 17
                  # 2b. Top Temp (Probe 2) Main Text (Rendered second so it sits on top)
                  - label:
                      id: lbl_temp_kmeter2_value
                      text: "?"
                      text_font: font_lg
                      text_color: c_text_p
                      align: TOP_MID
                      y: 15

                  # 3a. Bottom Temp Drop Shadow (Rendered first so it sits behind)
                  - label:
                      id: lbl_temp_kmeter1_shadow
                      text: "?"
                      text_font: font_lg
                      text_color: c_black
                      align: BOTTOM_MID
                      # Offset by 2 pixels
                      x: 2
                      y: -13
                  # 3b. Bottom Temp (Probe 1) Main Text (Rendered second so it sits on top)
                  - label:
                      id: lbl_temp_kmeter1_value
                      text: "?"
                      text_font: font_lg
                      text_color: c_text_p
                      align: BOTTOM_MID
                      y: -15

            # --- The Info Panel (Flanked) ---
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                pad_all: 0
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                layout:
                  type: FLEX
                  flex_flow: COLUMN
                  flex_align_main: CENTER
                  flex_align_cross: CENTER
                  pad_row: 10
                widgets:
                  - label:
                      text: "VVB:"
                      text_font: font_md
                      text_color: c_text_s
                  - obj:
                      width: SIZE_CONTENT
                      height: SIZE_CONTENT
                      bg_opa: TRANSP
                      border_width: 0
                      layout:
                        type: FLEX
                        flex_flow: ROW
                        flex_align_cross: CENTER
                        pad_column: 4
                      widgets:
                        - label:
                            id: lbl_temp_kmeter_mix_value
                            text: "?"
                            text_font: font_xl
                            text_color: c_text_p
                        - label:
                            text: "°C"
                            text_font: font_lg
                            text_color: c_text_s
