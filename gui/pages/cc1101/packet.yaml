# LVGL CC1101 Radio packet mode page

# required vars:
# - *page_styles
# - *container_styles
# - page_title

# CC1101 Packet mode page
#lvgl:
#  pages:
    id: page_cc1101
    <<: !include ../../styles/page_styles.yaml
    # REMOVED: `<<: *page_styles`
    # ADDED: Use the variables passed from the parent file
    pad_top: ${page_pad_top}
    pad_bottom: ${page_pad_bottom}
    on_load:
      - lvgl.label.update:
          id: lbl_page_title
          text: ${page_title}
    <<: !include
      file: ../../functions/swipe_navigation.yaml
    widgets:
      - obj:
          <<: !include ../../styles/container_styles.yaml
          # Use the passed-in variables for size
          pad_top: ${container_pad_top}
          pad_bottom: ${container_pad_bottom}
          pad_left: ${container_pad_left}
          pad_right: ${container_pad_right}
          scrollable: ${container_scrollable}
          align: CENTER
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: SPACE_EVENLY
            flex_align_cross: CENTER
            flex_align_track: CENTER
            pad_row: 0
            pad_column: 0
          widgets:
            # --- Row 1: Frequency ---
            - obj:
                # This is a container for a single row
                width: 100%
                height: SIZE_CONTENT
                pad_all: 0
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                layout:
                  type: FLEX
                  flex_flow: ROW
                  flex_align_main: SPACE_BETWEEN
                  flex_align_cross: CENTER
                  pad_row: 0
                  pad_column: 0
                widgets:
                  # Descriptor Label
                  - label:
                      id: lbl_frequency_l
                      text: "Frekvens: "
                      pad_left: ${container_pad_left}
                      pad_right: ${container_pad_right}
                      text_font: font_sm
                      text_color: c_text_s
                  # Value Label
                  - label:
                      id: lbl_frequency_value
                      text: "?"
                      text_font: font_md
                      text_color: c_text_p
                  # Unit Label
                  - label:
                      id: lbl_frequency_unit
                      text: "Mhz"
                      pad_right: ${container_pad_right}
                      text_font: font_sm
                      text_color: c_text_s

            # --- Row 2: Modulation & Tx Power ---
            - obj:
                width: 100%
                height: SIZE_CONTENT
                pad_all: 0
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                layout:
                  type: FLEX
                  flex_flow: ROW
                  flex_align_main: SPACE_BETWEEN
                  flex_align_cross: CENTER
                  pad_row: 0
                  pad_column: 0
                widgets:
                  - obj:
                      width: 65%
                      height: SIZE_CONTENT
                      pad_all: 0
                      pad_left: 0
                      pad_right: 10
                      layout:
                        type: FLEX
                        flex_flow: ROW
                        flex_align_main: START
                        flex_align_cross: CENTER
                        pad_row: 0
                        pad_column: 0
                      widgets:
                        # Descriptor Label
                        - label:
                            id: lbl_modulation_l
                            text: "Protokoll: "
                            pad_left: ${container_pad_left}
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_s
                        # Value Label
                        - label:
                            id: lbl_modulation_value
                            text: "?"
                            pad_right: ${container_pad_right}
                            text_font: font_md
                            text_color: c_text_p
                  - obj:
                      width: 35%
                      height: SIZE_CONTENT
                      pad_all: 0
                      pad_left: 10
                      pad_right: 0
                      layout:
                        type: FLEX
                        flex_flow: ROW
                        flex_align_main: END
                        flex_align_cross: CENTER
                        pad_row: 0
                        pad_column: 0
                      widgets:
                        # Value Label
                        - label:
                            id: lbl_tx_power_value
                            text: "?"
                            pad_left: ${container_pad_left}
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_p
                        # Unit Label
                        - label:
                            id: lbl_tx_power_unit
                            text: "dBm"
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_s

            # --- Row 3: Transmit/Receive ---
            - obj:
                width: 100%
                height: SIZE_CONTENT
                pad_top: 10
                pad_bottom: 10
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                layout:
                  type: FLEX
                  flex_flow: ROW
                  flex_align_main: SPACE_BETWEEN
                  flex_align_cross: CENTER
                  pad_row: 0
                  pad_column: 0
                widgets:
                  # Descriptor Label
                  - label:
                      id: lbl_cc1101_state
                      text: "Mottar..."
                      pad_left: ${container_pad_left}
                      pad_right: ${container_pad_right}
                      text_font: font_sm
                      text_color: c_text_s
                  # Value Label
                  - led:
                      id: led_cc1101_state
                      color: c_green
                      height: 6
                      width: 26
                      radius: 3
                      shadow_width: 6
                      shadow_spread: 2
                  # Unit Label
                  - label:
                      id: lbl_cc1101_packet
                      text: "     "
                      pad_right: ${container_pad_right}
                      text_font: font_sm
                      text_color: c_text_s

            # --- Row 4: RSSI & LQI ---
            - obj:
                width: 100%
                height: SIZE_CONTENT
                pad_all: 0
                pad_left: ${container_pad_left}
                pad_right: ${container_pad_right}
                layout:
                  type: FLEX
                  flex_flow: ROW
                  flex_align_main: SPACE_BETWEEN
                  flex_align_cross: CENTER
                  pad_row: 0
                  pad_column: 0
                widgets:
                  - obj:
                      width: 50%
                      height: SIZE_CONTENT
                      pad_all: 0
                      pad_left: 0
                      pad_right: 10
                      layout:
                        type: FLEX
                        flex_flow: ROW
                        flex_align_main: START
                        flex_align_cross: CENTER
                        pad_row: 0
                        pad_column: 0
                      widgets:
                        # Descriptor Label
                        - label:
                            id: lbl_rssi_l
                            text: "RSSI: "
                            pad_left: ${container_pad_left}
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_s
                        # Value Label
                        - label:
                            id: lbl_rssi_value
                            text: "?"
                            text_font: font_md
                            text_color: c_text_p
                        # Unit Label
                        - label:
                            id: lbl_rssi_unit
                            text: "dBm"
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_s
                  - obj:
                      width: 50%
                      height: SIZE_CONTENT
                      pad_all: 0
                      pad_left: 10
                      pad_right: 0
                      layout:
                        type: FLEX
                        flex_flow: ROW
                        flex_align_main: END
                        flex_align_cross: CENTER
                        pad_row: 0
                        pad_column: 0
                      widgets:
                        # Descriptor Label
                        - label:
                            id: lbl_lqi_l
                            text: "LQI: "
                            pad_left: ${container_pad_left}
                            pad_right: ${container_pad_right}
                            text_font: font_sm
                            text_color: c_text_s
                        # Value Label
                        - label:
                            id: lbl_lqi_value
                            text: "?"
                            pad_right: ${container_pad_right}
                            text_font: font_md
                            text_color: c_text_p
