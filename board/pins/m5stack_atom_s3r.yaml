---
# https://docs.m5stack.com/en/core/AtomS3R
# PINs for m5stack ATOM S3R

substitutions:
  pin:
    int:
      i2c:
        sda: GPIO45
        scl: GPIO0
      spi:
        clk: GPIO15
        mosi: GPIO21
        disp:
          cs: GPIO14
          dc: GPIO42
          reset: GPIO48
    
    light:
      ir: GPIO47
    
    ext:
      i2c:
        grove:
          sda: GPIO2
          scl: GPIO1
        hat:
          sda: GPIO6
          scl: GPIO5
        port_abc:
          sda: GPIO38
          scl: GPIO39
      uart:
        grove:
          tx: GPIO1
          rx: GPIO2
        hat:
          tx: GPIO6
          rx: GPIO5
        port_abc:
          tx: GPIO6
          rx: GPIO5
      gpio:
        grove:
          in: GPIO1
          out: GPIO2
        hat:
          in: GPIO8
          out: GPIO7
        port_abc:
          in: GPIO8
          out: GPIO7
        
    btn: GPIO41

    cam:
      sda: GPIO12
      scl: GPIO9
      y0: nc
      y1: nc
      y2: GPIO3
      y3: GPIO42
      y4: GPIO46
      y5: GPIO48
      y6: GPIO4
      y7: GPIO17
      y8: GPIO11
      y9: GPIO13
      vs: GPIO10
      hs: GPIO14
      p_clk: GPIO40
      m_clk: GPIO21
      pwr: GPIO18

    audio:
      i2s_lrclk: GPIO3
      #i2s_wck: GPIO33
      i2s_bclk: GPIO17
      i2s_mclk: GPIO11
      i2s_din: GPIO4
      i2s_dati: GPIO4
      mic: GPIO4
      i2s_dout: GPIO48
      i2s_dato: GPIO48
      pwr: GPIO18

  # Internal
  i2c_int_sda_pin: GPIO45
  i2c_int_scl_pin: GPIO0
  spi_clk_pin: GPIO15
  spi_mosi_pin: GPIO21
  disp_cs_pin: GPIO14
  disp_dc_pin: GPIO42
  disp_reset_pin: GPIO48
  # GROVE
  i2c_grove_sda_pin: GPIO2
  i2c_grove_scl_pin: GPIO1
  in_grove_pin: GPIO1
  out_grove_pin: GPIO2
  tx_grove_pin: GPIO1
  rx_grove_pin: GPIO2
  # Mate HAT
  i2c_hat_sda_pin: GPIO6
  i2c_hat_scl_pin: GPIO5
  in_hat_pin: GPIO8
  out_hat_pin: GPIO7
  tx_uart_hat_pin: GPIO6
  rx_uart_hat_pin: GPIO5
  # Port ABC
  i2c_port_abc_sda_pin: GPIO38
  i2c_port_abc_scl_pin: GPIO39
  in_port_abc_pin: GPIO8
  out_port_abc_pin: GPIO7
  tx_port_abc_pin: GPIO6
  rx_port_abc_pin: GPIO5
  # Button
  button_pin: GPIO41
  # LED
  ir_pin: GPIO47
