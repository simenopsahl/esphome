---
# https://docs.m5stack.com/en/core/M5CoreS3%20SE
# Base functions for:
# M5Stack Core S3SE
#
# https://community.home-assistant.io/t/m5stack-m5cores3-se-with-microwakeword/761965/5
# https://github.com/luka6000/wake-word-voice-assistants/blob/main/m5stack-coreS3-se/m5stack-coreS3-se-spk.yaml

substitutions:
  time_timezone: "Europe/Oslo"
  mbus_i2c_shared: "false"
  module:
    internal:
      i2c_bus: i2c_internal
  device:
    model: "M5Stack Core S3 SE"
    framework:
      type: esp-idf

# Pins for this model
packages:
  pins: !include pins/m5stack_core_s3se.yaml

esphome:
  project:
    name: "M5Stack.Core S3 SE"

esp32:
# ESP32-S3@Xtensa LX7 Dual-Core, 240MHz
# PSRAM: 8MB Quad
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    advanced:
      compiler_optimization: PERF
      execute_from_psram: true
    sdkconfig_options:
      # Cache optimizations for display graphics
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: y
      # Memory allocation rules for graphics buffers
      CONFIG_SPIRAM_USE_CAPS_ALLOC: y
      CONFIG_SPIRAM_USE_MALLOC: y
    type: ${device.framework.type}

psram:
  mode: quad
  speed: 80MHz

wifi:
  enable_btm: true
  enable_rrm: true


logger:
  deassert_rts_dtr: true

#i2c:
# Int
#  - id: i2c_internal
#    sda:
#      number: ${pin.int.i2c.sda}
#      allow_other_uses: ${mbus_i2c_shared}
#    scl:
#      number: ${pin.int.i2c.scl}
#      allow_other_uses: ${mbus_i2c_shared}
#    frequency: ${i2c_internal_frequency}
#    scan: true
# Ext PINs
#  - id: i2c_bus
#    sda: ${pin.ext.i2c.mbus.sda}
#    scl: ${pin.ext.i2c.mbus.scl}
#    frequency: 200kHz
#    scan: true

spi:
  clk_pin: ${pin.int.spi.clk}
  mosi_pin: ${pin.int.spi.mosi}
  miso_pin: 
    number: ${pin.int.spi.miso}
    allow_other_uses: true

time:
  - platform: bm8563
    i2c_id: ${module.internal.i2c_bus}
    id: time_rtc
    address: 0x51
    update_interval: 15min
  - id: !extend time_homeassistant
    on_time_sync:
      - then:
          - bm8563.write_time:

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp2101, aw88298, aw9523b]

# PMU
axp2101:
  id: axp2101_pmu
  i2c_id: ${module.internal.i2c_bus}

# IO Expander
aw9523b:
  i2c_id: ${module.internal.i2c_bus}
  id: aw9523b_hub
  p0_drive_mode: PUSH_PULL
  interrupt_pin: ${pin.int.i2c.int}

