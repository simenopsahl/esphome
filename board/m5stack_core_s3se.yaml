display:
  - platform: mipi_spi
    id: display_lcd
    model: ili9342
    cs_pin: ${pin.int.spi.disp.cs}
    dc_pin:
      number: ${pin.int.spi.disp.dc}
      allow_other_uses: true
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 9
    dimensions:
      height: 240
      width: 320
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    invert_colors: true
    update_interval: 5s
    auto_clear_enabled: false

touchscreen:
  - platform: ft63x6
    i2c_id: ${module.internal.i2c_bus}
    id: touchscreen_ft63x6
#    update_interval: 20ms
#    interrupt_pin:
#      aw9523b_id: aw9523b_hub
#      number: 10
    reset_pin:
      aw9523b_id: aw9523b_hub
      number: 0
    on_touch:
      - then:
          - lambda: |-
                ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
                    touch.x,
                    touch.y,
                    touch.x_raw,
                    touch.y_raw
                    );  
          - if:
              condition:
                - light.is_off: backlight_light
              then:
                - light.turn_on:
                    id: backlight_light
                    brightness: 40%
#    on_update:
#      - logger.log:
#          format: Touch %d at (%d, %d)
#          args: [ 'touch->id', 'touch->x', 'touch->y' ]

binary_sensor:
  - platform: touchscreen
    id: touch
    name: Touchscreen
    entity_category: diagnostic
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
  # some aw9523b inputs (handle interrupts)
  - platform: gpio
    name: "ES_INT P0_3"
    pin:
      aw9523b_id: aw9523b_hub
      number: 3
    on_press:
      then:
        - logger.log: "ES7210 interrupt triggered"
    internal: true
  - platform: gpio
    name: "TF_SW P0_4"
    pin:
      aw9523b_id: aw9523b_hub
      number: 4 
    on_press:
      then:
        - logger.log: "TF_SW interrupt triggered"
    internal: true
  - platform: gpio
    name: "TOUCH_INT P1_2"
    pin:
      aw9523b_id: aw9523b_hub
      number: 10
    on_press:
      then:
        - logger.log: "TOUCH interrupt triggered"
    internal: true
  - platform: gpio
    name: "AW_INT P1_3"
    pin:
      aw9523b_id: aw9523b_hub
      number: 11
    on_press:
      then:
        - logger.log: "AW88298 interrupt triggered"
    internal: true

output:
  - platform: axp2101
    type: range
    channel: DLDO1
    id: backlight_output
    min_voltage: 2600
    max_voltage: 3300

  - platform: axp2101
    channel: ALDO1
    voltage: 1800

  - platform: axp2101
    channel: ALDO2
    voltage: 3300
  
  - platform: axp2101
    channel: BLDO1
    voltage: 2800
  
  - platform: axp2101
    channel: BLDO2
    voltage: 1500

#  - platform: axp2101
#    channel: DCDC1
#    voltage: 3300

#  - platform: axp2101
#    channel: DCDC3
#    voltage: 3300

# https://devices.esphome.io/devices/M5Stack-Fire#wifi-issues-due-to-gpio15
#  - platform: gpio
#    id: wifi_fix_output
#    pin: ${mbus23}

light:
  # White
  - platform: monochromatic
    id: backlight_light
    output: backlight_output
    default_transition_length: 250ms
    restore_mode: RESTORE_AND_ON
    initial_state:
      state: on
      brightness: 25%
    name: "Backlight"
    entity_category: config
    # on_state:
    #   - lambda: |-
    #       uint8_t light;
    #       if (id(axp2101).read_byte(0x99, &light))
    #         id(backlight).turn_on().set_brightness( (( light << 5 ) - 641 ) /255 );

switch:
  - platform: gpio
    id: sw_bus_out_en
    name: "BUS_OUT_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 1
    # BUS_OUT_EN = 1
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

  - platform: gpio
    id: sw_usb_otg_en
    name: "USB_OTG_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 5
    # USB_OTG_EN = 0
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    disabled_by_default: true

  - platform: gpio
    id: sw_boost_en
    name: "BOOST_EN"
    pin:
      aw9523b_id: aw9523b_hub
      number: 15
    # BOOST_EN
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config