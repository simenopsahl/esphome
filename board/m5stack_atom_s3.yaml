---
# https://docs.m5stack.com/en/core/AtomS3
# Base functions for:
# M5Stack AtomS3
#

substitutions:
  device:
    framework:
      type: esp-idf

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_s3.yaml

esphome:
  project:
    name: "M5Stack.Atom S3"

esp32:
  board: m5stack-atoms3
  variant: ESP32S3
  flash_size: 8MB
  framework:
    advanced:
      compiler_optimization: PERF
    type: ${device.framework.type}

wifi:
  enable_btm: true
  enable_rrm: true

spi:
  clk_pin: ${pin.int.spi.clk}
  mosi_pin: ${pin.int.spi.mosi}

# IR
remote_transmitter:
  pin: ${pin.light.ir}
  carrier_duty_percent: 50%

output:
  - platform: ledc
    id: backlight_output
    pin: ${pin.light.disp_bl}
    frequency: 500Hz
    min_power: 0.2
    max_power: 1.0
    zero_means_zero: true

light:
  # White
  - platform: monochromatic
    id: backlight_light
    output: backlight_output
    default_transition_length: 100ms
    restore_mode: RESTORE_AND_ON
    initial_state:
      state: on
      brightness: 25%
    name: "Backlight"
    entity_category: config

# Button
binary_sensor:
  - platform: gpio
    id: btn_display
    pin:
      number: ${pin.btn}
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    name: Button
    entity_category: diagnostic

