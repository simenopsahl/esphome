---
# https://docs.m5stack.com/en/core/Atom-Matrix_v1.1
# Base functions for:
# M5Stack Atom Matrix v1.1
#

substitutions:
  device:
    model: "M5Stack Atom Matrix"
    framework:
      type: esp-idf

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_lite.yaml

esphome:
  project:
    name: "M5Stack.Atom Matrix"

esp32:
# ESP32-PICO-D4@Dual-core processor, 240MHz
  variant: esp32
  flash_size: 4MB
  cpu_frequency: 240MHz
  framework:
    type: ${device.framework.type}
    advanced:
      compiler_optimization: PERF
      sram1_as_iram: true

wifi:
  enable_btm: true
  enable_rrm: true

# IR
#remote_transmitter:
#  pin: $ir_pin
#  carrier_duty_percent: 50%
#  rmt_symbols: 64

light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    rgb_order: GRB
    pin: ${pin.light.rgb}
    num_leds: 25
    rmt_symbols: 128
    chipset: ws2812
    color_correct: [75%, 75%, 75%]
    effects:
      - pulse:
      - strobe:
      - strobe:
          name: "Slow Blink" # 200ms on, 1500ms off
          colors:
            - state: true
              brightness: 25%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
              transition_length: 500ms
            - state: false
              duration: 2000ms
              transition_length: 1000ms
    default_transition_length: 50ms
    restore_mode: ALWAYS_OFF
    name: "LED"
    on_turn_on:
      lambda: |-
        id(display_matrix)->set_enabled(false);
    on_turn_off:
      lambda: |-
        id(display_matrix)->set_enabled(true);

display:
  - platform: addressable_light
    addressable_light_id: rgb_led
    id: display_matrix
    width: 5
    height: 5
    pages:
      - id: page_bulls_eye_r
        lambda: |-
          // Draw a bulls-eye pattern
          Color red = Color(0xFF0000);
          Color green = Color(0x00FF00);
          Color blue = Color(0x0000FF);
          it.rectangle(0, 0, 5, 5, red);
          it.rectangle(1, 1, 3, 3, green);
          it.draw_pixel_at(2, 2, blue);
      - id: page_bulls_eye_b
        lambda: |-
          // Draw a bulls-eye pattern
          Color red = Color(0xFF0000);
          Color green = Color(0x00FF00);
          Color blue = Color(0x0000FF);
          it.rectangle(0, 0, 5, 5, blue);
          it.rectangle(1, 1, 3, 3, red);
          it.draw_pixel_at(2, 2, green);
      - id: page_bulls_eye_g
        lambda: |-
          // Draw a bulls-eye pattern
          Color red = Color(0xFF0000);
          Color green = Color(0x00FF00);
          Color blue = Color(0x0000FF);
          it.rectangle(0, 0, 5, 5, green);
          it.rectangle(1, 1, 3, 3, blue);
          it.draw_pixel_at(2, 2, red);

# Button
binary_sensor:
  - platform: gpio
    id: btn_matrix
    name: Button
    entity_category: diagnostic
    pin:
      number: ${pin.btn}
      inverted: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    on_click:
      min_length: 1000ms
      max_length: 5000ms
      then:
        - logger.log: Button Held
        - light.turn_off:
            id: rgb_led

