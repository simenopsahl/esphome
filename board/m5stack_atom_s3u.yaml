labels: [esp32s3, WS2812, RGB, microphone]
---
# https://docs.m5stack.com/en/core/AtomS3U
# Base functions for:
# M5Stack AtomS3U
#

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_s3u.yaml
  status_led: !include ../features/system_status_led.yaml

substitutions:
  device:
    model: "M5Stack Atom S3U"
    rmt_symbols_block: 48
    framework:
      type: esp-idf

esphome:
  project:
    name: "M5Stack.Atom S3U"

esp32:
# ESP32-S3FN8@Dual-core Xtensa LX7, 240MHz
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    advanced:
      compiler_optimization: PERF
    type: ${device.framework.type}

#i2s_audio:
#  id: i2s_audio_bus
#  i2s_lrclk_pin: ${pin.audio.i2s_lrclk}

light:
  #G35=RGB WS2812C-2020
  - platform: esp32_rmt_led_strip
    id: rgb_led
    rgb_order: GRB
    pin: ${pin.light.rgb}
    num_leds: 1
    # RMT 0 channels will be occupied by IR
#    rmt_channel: 1
    rmt_symbols: ${device.rmt_symbols_block}
    chipset: ws2812
    effects:
      - pulse:
      - strobe:
      - strobe:
          name: "Slow Blink" # 200ms on, 1500ms off
          colors:
            - state: true
              brightness: 25%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
              transition_length: 500ms
            - state: false
              duration: 2000ms
              transition_length: 1000ms
#      - addressable_flicker:
#      - addressable_rainbow:
#      - addressable_color_wipe:
#      - addressable_scan:
#      - addressable_twinkle:
    default_transition_length: 100ms
    initial_state:
      state: true
      brightness: 50%
      color_brightness: 100%
      red: 100%
      green: 0%
      blue: 0%
    name: "LED"
    entity_category: config

#G41=Button
binary_sensor:
  - platform: gpio
    name: Button
    entity_category: diagnostic
    pin:
      number: ${pin.btn}
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    on_click:
      min_length: 1000ms
      max_length: 5000ms
      then:
        - logger.log: Button Held
        - light.turn_off:
            id: rgb_led

