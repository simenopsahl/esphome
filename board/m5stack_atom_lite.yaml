---
# https://docs.m5stack.com/en/core/ATOM%20Lite
# Base functions for:
# M5Stack Atom Lite
#

substitutions:
  device:
    model: "M5Stack Atom Lite"
    framework:
      type: esp-idf

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_lite.yaml
  status_led: !include ../features/system_status_led.yaml

esphome:
  project:
    name: "M5Stack.Atom Lite"

esp32:
# ESP32-PICO-D4@Dual-core processor, 240MHz
  variant: esp32
  flash_size: 4MB
  cpu_frequency: 240MHz
  framework:
    type: ${device.framework.type}
    advanced:
      compiler_optimization: PERF
      sram1_as_iram: true

wifi:
  enable_btm: true
  enable_rrm: true

# IR
#remote_transmitter:
#  pin: $ir_pin
#  carrier_duty_percent: 50%
#  rmt_symbols: 144

light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    rgb_order: GRB
    pin: ${pin.light.rgb}
    num_leds: 1
    rmt_symbols: 384
    chipset: sk6812
    effects:
      - pulse:
      - strobe:
      - strobe:
          name: "Slow Blink" # 200ms on, 1500ms off
          colors:
            - state: true
              brightness: 25%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
              transition_length: 500ms
            - state: false
              duration: 2000ms
              transition_length: 1000ms
    default_transition_length: 100ms
    initial_state:
      state: true
      brightness: 50%
      color_brightness: 100%
      red: 100%
      green: 0%
      blue: 0%
    name: "LED"
    entity_category: config

# Button
binary_sensor:
  - platform: gpio
    name: Button
    entity_category: diagnostic
    pin:
      number: ${pin.btn}
      inverted: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    on_click:
      min_length: 1000ms
      max_length: 5000ms
      then:
        - logger.log: Button Held
        - light.turn_off:
            id: rgb_led

