# Personal settings for Everything Presence Lite
# https://github.com/EverythingSmartHome/everything-presence-lite
# https://docs.everythingsmart.io/s/products/doc/everything-presence-lite-epl-ZVnBzYzuX2

# Specific bluetooth settings, paste in root device yaml
substitutions:
  illuminance_update_interval: "5s"
  device:
    model: "Everything Presence Lite"

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            if (std::string("${ device_config.bluetooth_enabled | lower }") == "true") {
              id(firmware_ble).publish_state("Enabled");
            } else {
              id(firmware_ble).publish_state("Disabled");
            }

            if (std::string("${ device_config.co2_enabled | lower }") == "true") {
              id(firmware_co2).publish_state("Enabled");
            } else {
              id(firmware_co2).publish_state("Disabled");
            }

esp32:
  framework:
    advanced:
      assertion_level: DISABLE
      compiler_optimization : PERF
      minimum_chip_revision: 3.1

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 30min
  fast_connect: true
  passive_scan: true
  enable_btm: true
  enable_rrm: true

api:
  reboot_timeout: 90min
  encryption:
    key: !secret homeassistant_api

bluetooth_proxy:
  active: false
  connection_slots: 1

esp32_ble:
  max_connections: 2

esp32_ble_tracker:
  scan_parameters:
    interval: 500ms
    window: 10ms

binary_sensor:
  - id: !extend zone2_occupancy
    disabled_by_default: false
  - id: !extend zone3_occupancy
    disabled_by_default: false
  - id: !extend zone4_occupancy
    disabled_by_default: false

sensor:
  - id: !extend target1_speed
    disabled_by_default: true
  - id: !extend target1_resolution
    disabled_by_default: true
  - id: !extend target1_angle
    disabled_by_default: true

  - id: !extend target2_speed
    disabled_by_default: true
  - id: !extend target2_resolution
    disabled_by_default: true
  - id: !extend target2_angle
    disabled_by_default: true

  - id: !extend target3_speed
    disabled_by_default: true
  - id: !extend target3_resolution
    disabled_by_default: true
  - id: !extend target3_angle
    disabled_by_default: true

  - id: !extend zone2_target_count
    disabled_by_default: false
  - id: !extend zone3_target_count
    disabled_by_default: false
  - id: !extend zone4_target_count
    disabled_by_default: false

number:
  - id: !extend zone_2_off_delay
    disabled_by_default: false
  - id: !extend zone_3_off_delay
    disabled_by_default: false
  - id: !extend zone_4_off_delay
    disabled_by_default: false

select:
  - id: !extend tracking_behaviour
    initial_option: Above + Distance and Angle
  - id: !extend update_speed_select
    initial_option: Slow (0.4s)
