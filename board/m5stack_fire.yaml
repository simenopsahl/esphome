---
# https://docs.m5stack.com/en/core/fire_v2.7
# Base functions for:
# M5Stack Fire
#

substitutions:
  device:
    model: "M5Stack Fire"
    framework:
      type: esp-idf
  module:
    internal:
      i2c_bus: i2c_internal

# Pins for this model
packages:
  pins: !include pins/m5stack_fire.yaml

esphome:
  project:
    name: "M5Stack.Fire"
    version: "2.7"

esp32:
# ESP32-D0WDQ6@Dual-core processor, Main frequency 240MHz
# PSRAM: 8MB Quad
  variant: ESP32
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: ${device.framework.type}
    advanced:
      compiler_optimization: PERF
      minimum_chip_revision: 3.1
      sram1_as_iram: true

# PSRAM is shared with UART bus tx17/rx16
#psram:
#  mode: quad
#  speed: 80MHz

wifi:
  enable_btm: true
  enable_rrm: true

#external_components:
#  - source:
#      type: git
#      url: https://github.com/ssieb/custom_components
#    components: [ip5306]

#ip5306:
