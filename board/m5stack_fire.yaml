#    name: Battery Level
#  charger_connected:
#    id: ip5306_charger_connected
#  charge_full:
#    id: ip5306_charge_full

spi:
  clk_pin: ${pin.int.spi.clk}
  mosi_pin: ${pin.int.spi.mosi}
  miso_pin: ${pin.int.spi.miso}

# IR
#remote_transmitter:
#  pin: ${ir_pin}
#  carrier_duty_percent: 50%
#  rmt_symbols: 144

# 320x240 ILI9342C LCD
display:
  - platform: mipi_spi
    id: display_lcd
    model: ili9342
    cs_pin: ${pin.int.spi.disp.cs}
    dc_pin: ${pin.int.spi.disp.dc}
    reset_pin: ${pin.int.spi.disp.reset}
    data_rate: 20Mhz
    dimensions:
      height: 240
      width: 320
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    invert_colors: true
    update_interval: 5s

output:
  # backlight output
  - platform: ledc
    id: backlight_output
    pin: ${pin.light.disp_bl}
  # Buzzer
  - platform: ledc
    id: buzzer
    pin: ${pin.audio.buzzer}

light:
  - platform: monochromatic # backlight
    id: backlight_light
    output: backlight_output
    default_transition_length: 100ms
    restore_mode: RESTORE_AND_ON
    initial_state:
      state: on
      brightness: 25%
    name: "Backlight"
    entity_category: config

# Speaker (only got buzzer to work)
#i2s_audio:
#  i2s_lrclk_pin: ${pin.int.audio.i2s_lrclk}

#media_player:
#  - platform: i2s_audio
#    id: media_player_out
#    dac_type: internal
#    mode: stereo
#    name: "Internal Media Player"

# Buttons
binary_sensor:
  # Button A
  - platform: gpio
    id: btn_a
    name: "Button A"
    entity_category: diagnostic
    pin:
      number: ${pin.btn.a}
      inverted: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button A Pressed
      - script.execute: buzzer_beep
    on_release:
      - output.turn_off: buzzer
  # Button B
  - platform: gpio
    id: btn_b
    name: "Button B"
    entity_category: diagnostic
    pin:
      number: ${pin.btn.b}
      inverted: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button B Pressed
      - script.execute: buzzer_beep
    on_release:
      - output.turn_off: buzzer
  # Button C
  - platform: gpio
    id: btn_c
    name: "Button C"
    entity_category: diagnostic
    pin:
      number: ${pin.btn.c}
      inverted: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button C Pressed
      - script.execute: buzzer_beep
    on_release:
      - output.turn_off: buzzer

