---
# https://docs.m5stack.com/en/core/AtomS3R
# Base functions for:
# M5Stack AtomS3R
#

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_s3r.yaml
  i2c_int: !include extension/internal_i2c.yaml

substitutions:
  time_timezone: "Europe/Oslo"
  mbus_i2c_shared: "false"
  module:
    internal:
      i2c_bus: i2c_internal
  device:
    framework:
      type: esp-idf

esphome:
  project:
    name: "M5Stack.Atom S3R"
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    build_flags:
      - "-w" # https://docs.platformio.org/en/latest/projectconf/sections/env/options/build/build_flags.html
      - "-DBOARD_HAS_PSRAM"
      - "-DARDUINO_USB_CDC_ON_BOOT=1"
      - "-mfix-esp32-psram-cache-issue"

psram:
  mode: octal
  speed: 80MHz

esp32:
#  board: m5stack-atoms3
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: ${device.framework.type}
    advanced:
      compiler_optimization: PERF
#    version: 5.3.1
#    platform_version: 6.9.0
    # Custom sdkconfig options
    sdkconfig_options: # https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-reference/kconfig.html#config-compiler-disable-gcc12-warnings
      CONFIG_SPIFFS_DBG: n

wifi:
  enable_btm: true
  enable_rrm: true

spi:
  clk_pin: ${pin.int.spi.clk}
  mosi_pin: ${pin.int.spi.mosi}

# IR
#remote_transmitter:
#  pin: ${pin.light.ir}
#  carrier_duty_percent: 50%
#  rmt_symbols: 144

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [ lp5562 ]

lp5562:
  - i2c_id: ${module.internal.i2c_bus}
    id: led_lp5562
    use_internal_clk: true
    high_pwm_freq: true
    logarithmic_dimming: true
    red_current: 15.5
    green_current: 16.5
    blue_current: 22.5
    white_current: 21.5

output:
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_red_channel
    channel: red
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_green_channel
    channel: green
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_blue_channel
    channel: blue
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_white_channel
    channel: white

light:
  # White
  - platform: monochromatic
    id: backlight_light
    output: lp5562_white_channel
    restore_mode: RESTORE_DEFAULT_ON
    initial_state:
      state: on
      brightness: 25%
    default_transition_length: 50ms
    name: "Backlight"
    entity_category: config
  # RGBW
#  - platform: rgbw
#    id: backlight_rgbw
#    red: lp5562_red_channel
#    green: lp5562_green_channel
#    blue: lp5562_blue_channel
#    white: lp5562_white_channel
#    color_interlock: true
#    default_transition_length: 100ms
#    restore_mode: RESTORE_DEFAULT_ON
#    name: "Backlight RGBW"
#    entity_category: config

# Button
binary_sensor:
  - platform: gpio
    id: btn_display
    pin:
      number: ${pin.btn}
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    name: Button
    entity_category: diagnostic

display:
#  - platform: ili9xxx
#    model: st7789v
#    id: display_lcd
#    cs_pin: ${pin.int.spi.disp.cs}
#    dc_pin: ${pin.int.spi.disp.dc}
#    reset_pin: ${pin.int.spi.disp.reset}
#    data_rate: 40Mhz
#    invert_colors: true
#    update_interval: 5s
#    dimensions:
#      height: 128
#      width: 128
#      offset_height: 2
#      offset_width: 1
  - platform: mipi_spi
    model: st7789v
    id: display_lcd
    cs_pin: ${pin.int.spi.disp.cs}
    dc_pin: ${pin.int.spi.disp.dc}
    reset_pin: ${pin.int.spi.disp.reset}
    data_rate: 40Mhz
    invert_colors: true
    update_interval: 5s
    dimensions:
      height: 128
      width: 128
      offset_height: 2
      offset_width: 1