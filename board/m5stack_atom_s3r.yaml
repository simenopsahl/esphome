labels: [esp32s3, psram, ST7789V, display, BMI270]
---
# https://docs.m5stack.com/en/core/AtomS3R
# Base functions for:
# M5Stack AtomS3R
#

# Pins for this model
packages:
  pins: !include pins/m5stack_atom_s3r.yaml
  i2c_int: !include extension/internal_i2c.yaml

substitutions:
  time_timezone: "Europe/Oslo"
  mbus_i2c_shared: "false"
  module:
    internal:
      i2c_bus: i2c_internal
  device:
    model: "M5Stack Atom S3R"
    rmt_symbols_block: 48
    framework:
      type: esp-idf

esphome:
  project:
    name: "M5Stack.Atom S3R"

esp32:
# ESP32-S3-PICO-1-N8R8@Dual-core Xtensa LX7, up to 240MHz
# PSRAM: 8MB Octal
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    advanced:
      compiler_optimization: PERF
      execute_from_psram: true
    sdkconfig_options:
      # Cache optimizations for display graphics
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: y
      # Memory allocation rules for graphics buffers
      CONFIG_SPIRAM_USE_CAPS_ALLOC: y
      CONFIG_SPIRAM_USE_MALLOC: y
    type: ${device.framework.type}

psram:
  mode: octal
  speed: 80MHz

wifi:
  enable_btm: true
  enable_rrm: true

spi:
  clk_pin: ${pin.int.spi.clk}
  mosi_pin: ${pin.int.spi.mosi}

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [ lp5562 ]

output:
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_red_channel
    channel: red
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_green_channel
    channel: green
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_blue_channel
    channel: blue
  - platform: lp5562
    lp5562_id: led_lp5562
    id: lp5562_white_channel
    channel: white

light:
  # White
  - platform: monochromatic
    id: backlight_light
    output: lp5562_white_channel
    restore_mode: RESTORE_DEFAULT_ON
    initial_state:
      state: on
      brightness: 25%
    default_transition_length: 50ms
    name: "Backlight"
    entity_category: config
  # RGBW
#  - platform: rgbw
#    id: backlight_rgbw
#    red: lp5562_red_channel
#    green: lp5562_green_channel
#    blue: lp5562_blue_channel
#    white: lp5562_white_channel
#    color_interlock: true
#    default_transition_length: 100ms
#    restore_mode: RESTORE_DEFAULT_ON
#    name: "Backlight RGBW"
#    entity_category: config

display:
  - platform: mipi_spi
    model: st7789v
    id: display_lcd
    cs_pin: ${pin.int.spi.disp.cs}
    dc_pin: ${pin.int.spi.disp.dc}
    reset_pin: ${pin.int.spi.disp.reset}
    data_rate: 40Mhz
    invert_colors: true
    update_interval: 10s
    auto_clear_enabled: false
    dimensions:
      height: 128
      width: 128
      offset_width: 2     
      offset_height: 1
      pad_width: 2
      pad_height: 1

# Button
binary_sensor:
  - platform: gpio
    id: btn_display
    pin:
      number: ${pin.btn}
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      - logger.log: Button Pressed
    name: Button
    entity_category: diagnostic

# IR
#remote_transmitter:
#  pin: ${pin.light.ir}
#  carrier_duty_percent: 50%
#  rmt_symbols: ${device.rmt_symbols_block}

lp5562:
  i2c_id: ${module.internal.i2c_bus}
  id: led_lp5562
  use_internal_clk: true
#  high_pwm_freq: true
#  logarithmic_dimming: true
#  red_current: 15.5
#  green_current: 16.5
#  blue_current: 22.5
  white_current: 17.5
