---
# https://docs.m5stack.com/en/base/m5go_bottom

substitutions:
  pin:
    m5go:
      port_b:
        in: ${pin.ext.mbus.p4}
        out: ${pin.ext.mbus.p10}
      port_c:
        rx: ${pin.ext.mbus.p15}
        tx: ${pin.ext.mbus.p16}
      pogo:
        sda: ${pin.ext.mbus.p17}
        scl: ${pin.ext.mbus.p18}
      light:
        ir: ${pin.ext.mbus.p22}
        rgb_led: ${pin.ext.mbus.p23}
      mic: ${pin.ext.mbus.p26}

# RGB SK6812-2020
light:
  - platform: esp32_rmt_led_strip
    id: rgb_led_m5go
    rgb_order: GRB
    pin: ${pin.m5go.light.rgb_led}
    num_leds: 10
    # RMT 0 channels will be occupied by IR
#    rmt_channel: 1
    rmt_symbols: ${device.rmt_symbols_block * 2}
    chipset: sk6812
    effects:
      - pulse:
      - strobe:
      - strobe:
          name: "Slow Blink" # 500ms on, 2000ms off
          colors:
            - state: true
              brightness: 25%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
              transition_length: 500ms
            - state: false
              duration: 2000ms
              transition_length: 1000ms
#      - addressable_flicker:
#      - addressable_rainbow:
#      - addressable_color_wipe:
#      - addressable_scan:
#      - addressable_twinkle:
    default_transition_length: 100ms
    initial_state:
      state: true
      brightness: 50%
      color_brightness: 100%
      red: 100%
      green: 0%
      blue: 0%
    name: "m5go LED"
    entity_category: config
