---
# https://docs.m5stack.com/en/module/PM2.5%20AIR%20QUALITY%20KIT%20(Excluding%20Core)
# https://esphome.io/components/sensor/pmsx003.html
# https://github.com/Chill-Division/M5Stack-ESPHome/

substitutions:
  module:
    air_quality_uart_bus: uart_mbus

# Module Air Quality
sensor:
  - platform: pmsx003
    type: PMSX003
    id: pmsx003_sensor
    uart_id: ${module.air_quality_uart_bus}
    update_interval: 120s
    pm_1_0:
      id: pm1_pmsa003
      name: "PM1 PMSA003"
      device_class: "pm1"
      state_class: "measurement"
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
      on_value:
        - then:
            - lvgl.label.update:
                id: lbl_pm1_value
                text:
                  format: "%.1f"
                  args: [ 'x' ]
    pm_2_5:
      id: pm_25_pmsa003
      name: "PM2.5 PMSA003"
      device_class: "pm25"
      state_class: "measurement"
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
      on_value:
        - then:
            - lvgl.label.update:
                id: lbl_pm25_value
                text:
                  format: "%.1f"
                  args: [ 'x' ]
    pm_10_0:
      id: pm_10_pmsa003
      name: "PM10 PMSA003"
      device_class: "pm10"
      state_class: "measurement"
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
      on_value:
        - then:
            - lvgl.label.update:
                id: lbl_pm10_value
                text:
                  format: "%.1f"
                  args: [ 'x' ]

lvgl:
  pages:
    - id: page_airq
      pad_top: 32
      pad_bottom: 32
      on_load:
        - lvgl.label.update:
            id: lbl_page_title
            text: Luftkvalitet
      <<: !include
        file: ../../gui/functions/swipe_navigation.yaml
      widgets:
        - obj:
            pad_top: 1
            pad_bottom: 1
            pad_left: 4
            pad_right: 4
            scrollable: false
            align: CENTER
            height: 100%
            width: 100%
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
              flex_align_track: CENTER
              pad_row: 0
              pad_column: 0
            widgets:
              # --- Row 1: Temperature ---
              - obj:
                  # This is a container for a single row
                  width: 100%
                  height: SIZE_CONTENT
                  pad_all: 0
                  pad_left: 4
                  pad_right: 4
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    # Descriptor Label
                    - label:
                        id: lbl_temp_local_l
                        text: "Temperatur: "
                        pad_left: 4
                        pad_right: 4
                        text_font: font_sm
                        text_color: c_text_s
                    # Value Label
                    - label:
                        id: lbl_temp_local_value
                        text: "?"
                        pad_right: 4
                        text_font: font_lg
                        text_color: c_text_p
                    # Unit Label
                    - label:
                        id: lbl_temp_local_unit
                        text: "°C"
                        text_font: font_md
                        text_color: c_text_s

              # --- Row 2: Carbonmonoxide ---
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  pad_all: 0
                  pad_left: 4
                  pad_right: 4
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    # Descriptor Label
                    - label:
                        id: lbl_co2_l
                        text: "Karbondioksid: "
                        pad_left: 4
                        pad_right: 4
                        text_font: font_sm
                        text_color: c_text_s
                    # Value Label
                    - label:
                        id: lbl_co2_value
                        text: "?"
                        pad_right: 4
                        text_font: font_lg
                        text_color: c_text_p
                    # Unit Label
                    - label:
                        id: lbl_co2_unit
                        text: "ppm"
                        text_font: font_md
                        text_color: c_text_s

              # --- Row 3: PM1.0 ---
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  pad_all: 0
                  pad_left: 4
                  pad_right: 4
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    # Descriptor Label
                    - label:
