                        pad_right: 4
                        text_font: font_lg
                        text_color: c_text_p
                    # Unit Label
                    - label:
                        id: lbl_pm1_unit
                        text: "µg/m³"
                        text_font: font_md
                        text_color: c_text_s

              # --- Row 4: PM2.5 ---
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  pad_all: 0
                  pad_left: 4
                  pad_right: 4
