                    # Unit Label
                    - label:
                        id: lbl_pm25_unit
                        text: "µg/m³"
                        text_font: font_md
                        text_color: c_text_s

              # --- Row 5: PM10.0 ---
              - obj:
                  width: 100%
                  height: SIZE_CONTENT
                  pad_all: 0
                  pad_left: 4
