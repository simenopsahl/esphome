                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    # Descriptor Label
                    - label:
                        id: lbl_pm25_l
                        text: "Svevestøv 2.5: "
                        pad_left: 4
                        pad_right: 4
                        text_font: font_sm
                        text_color: c_text_s
                    # Value Label
                    - label:
                        id: lbl_pm25_value
                        text: "?"
                        pad_right: 4
                        text_font: font_lg
