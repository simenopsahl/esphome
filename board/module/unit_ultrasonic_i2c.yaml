labels: [RCWL-9620, distance, i2c]
---
# https://docs.m5stack.com/en/unit/ULTRASONIC%20I2C
# https://github.com/Chill-Division/M5Stack-ESPHome/blob/main/Ultrasonic%20Distance%20Unit%20I2C%20(RCWL-9620).md

substitutions:
  module:
    sonic_i2c_bus: i2c_grove

external_components:
  - source: github://chill-Division/M5Stack-ESPHome/
    components: sonic_i2c

# UNIT Ultrasonic I2C
sensor:
  - platform: sonic_i2c
    i2c_id: ${module.sonic_i2c_bus}
    id: ultrasonic
    name: "Ultrasonic Distance"
    update_interval: 5s
    device_class: distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    filters:
      - filter_out: nan
      - lambda: |-
          if (x == 0) {
          return {};  // This filters out the reading
          } else {
          return x;   // This passes the reading through
          }
      - sliding_window_moving_average:
          window_size: 2
          send_every: 3

  # Water tank level percentage calculation based on distance readings
  # https://www.jula.no/catalog/hage/vanning/vannslange-og-tilbehor/vanntonner/regnvannstonne-med-fot-033163/
  - platform: template
    name: "Reservoir Level"
    unit_of_measurement: "%"
    icon: "mdi:waves"
    update_interval: 10s # Or whatever update interval you prefer
    lambda: |-
      auto x = id(ultrasonic).state;
      const float min_distance = 200.0;
      const float max_distance = 940.0;
      if (isnan(x)) {
      return NAN; // Don't publish a value if the sensor reading is invalid
      }
      // Clamp the sensor reading to be within your defined min/max range
      x = clamp(x, min_distance, max_distance);
      // Calculate the percentage
      float percentage = 100.0 - ((x - min_distance) / (max_distance - min_distance) * 100.0);
      return percentage;
