packages:
  # --- COMMON PACKAGES ---
  <<: !include_dir_named common
  <<: !include_dir_named bluetooth

  # --- BOARD AND MODULES ---
  board: !include board/m5stack_atom_s3.yaml
  pir: !include board/module/unit_pir.yaml

  # --- GUI PACKAGES ---
  colors: !include gui/themes/colors_night_owl.yaml
  lvgl: !include gui/128x128.yaml

  # --- LVGL WIDGET PACKAGES ---
  room_temperature_widget_sensors:
    !include {
      file: gui/widgets/labels/number_sensor.yaml,
      vars: { uid: room_temp_value, entity_id: sensor.etg2_simen_tc_heatindex },
    }

substitutions:
  common:
    log_level: WARN
#    log_baud_rate: "115200"
  device:
    name: m5s-as3-a35af0
    location: "Storage"
    framework:
      type: esp-idf
  display:
    home_page: page_temperature

esphome:
  comment: ${device.model} @ ${device.location}
  name: ${device.name}
  friendly_name: ${device.name}
  area: ${device.location}
  project:
    version: "1.0.0"

wifi:
#  use_address: 192.168.69.99
  use_address: ${device.name}.local
  manual_ip: 
    gateway: 192.168.68.1
    subnet: 255.255.252.0
    static_ip: 192.168.71.51

# --- LVGL CLOCKS ---
time:
  - id: !extend time_homeassistant
    on_time_sync:
      - script.execute: lvgl_time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: lvgl_time_update

binary_sensor:
  - id: !extend btn_display
    on_press:
      - lvgl.page.next

  # Turn on display while room is occupied
  - platform: homeassistant
    entity_id: binary_sensor.etg2_simen_occupancy
    id: presence1
  - platform: homeassistant
    entity_id: binary_sensor.etg2_gang_occupancy
    id: presence1
  - id: !extend presence_detected
    lambda: !lambda |-
      if ( (id(presence1).state) or (id(presence2).state) ) {
        return true;
      } else {
        return false;
      }

lvgl:
  buffer_size: 15%
  rotation: 180

display:
  - id: !extend display_lcd
    dimensions:
      offset_height: 1
      offset_width: 2
#    transform:
#      mirror_x: true
#      mirror_y: true
