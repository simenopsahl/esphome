packages:
  # --- COMMON PACKAGES ---
  <<: !include_dir_named common

substitutions:
  common:
    log_level: INFO
    log_baud_rate: "0"
  device:
    model: "Tuya 433Mhz Hub"
    name: rf-link
    location: "TV Stue"

esphome:
  comment: ${device.model} @ ${device.location}
  name: ${device.name}
  friendly_name: ${device.name}
  project:
    name: "Tuya.RfLink"
    version: "1.0.0"

wifi:
#  use_address: 192.168.69.79
  use_address: rf-link.local
  manual_ip: 
    gateway: 192.168.68.1
    subnet: 255.255.252.0
    static_ip: 192.168.71.92

esp8266:
  board: esp01_1m

remote_receiver:
  pin: 4
  dump: rc_switch

remote_transmitter:
  pin: 5
  carrier_duty_percent: 100%

binary_sensor:
# Open
  - platform: remote_receiver
    id: mail_open_signal_1
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "010000010111111000000110"
      protocol: 4
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_open_signal_2
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "010000010111111000000110"
      protocol: 5
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_open_signal_3
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "000001010111111000000110"
      protocol: 4
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_open_signal_4
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "010001010111110000000110"
      protocol: 4
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_open_signal_5
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "0100010101111"
      protocol: 4
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_open_signal_6
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: ON
    rc_switch_raw:
      code: "000001010111111000000110"
      protocol: 5
    filters:
      delayed_off: 100ms
# Close
  - platform: remote_receiver
    id: mail_close_signal_1
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: OFF
    rc_switch_raw:
      code: "010000010111111000000110"
      protocol: 4
    filters:
      delayed_off: 100ms
  - platform: remote_receiver
    id: mail_close_signal_2
    on_press:
      then:
        - switch.template.publish:
            id: mailbox_switch
            state: OFF
    rc_switch_raw:
      code: "010000010111111000000110"
      protocol: 5
    filters:
      delayed_off: 100ms

  - platform: template
    id: mailbox_sensor
    name: "Postkasse"
    device_class: opening
    publish_initial_state: true
    lambda: |-
      if (id(mailbox_switch).state) {
        return true;
      } else {
        return false;
      }

switch:
  - platform: template
    id: mailbox_switch
    name: "Mailbox switch"
    optimistic: true
    turn_on_action:
      - binary_sensor.template.publish:
          id: mailbox_sensor
          state: ON
    turn_off_action:
      - binary_sensor.template.publish:
          id: mailbox_sensor
          state: OFF