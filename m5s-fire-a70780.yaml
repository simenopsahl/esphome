binary_sensor:
  # Call sensors from HA.
  - platform: homeassistant
    entity_id: binary_sensor.etg2_simen_occupancy
    id: motion1
  - platform: homeassistant
    entity_id: binary_sensor.etg2_gang_occupancy
    id: motion2
  # Turn on display while room is occupied
  - platform: template
    id: motion_detected
    lambda: !lambda |-
      if ( (id(motion1).state) or (id(motion2).state) ) {
        return true;
      } else {
        return false;
      }
    on_state: 
      then:
        - script.execute: display_on_off

  # Button Left
  - id: !extend btn_a
    on_press:
      - lvgl.page.previous
  # Button Mid
  - id: !extend btn_b
    on_press:
      - script.execute: go_home
  # Button Right
  - id: !extend btn_c
    on_press:
      - lvgl.page.next

sensor:
  # Combine sensors
  - id: !extend temperature_local
    sources:
      # Base BTC
      - source: temperature_sht30_base_btc
      # HAT ENV III
#      - source: temperature_sht30_hat_env
#      - source: temperature_qmp6988_hat_env
      # Unit ENV III
#      - source: temperature_sht30_unit_env
#      - source: temperature_qmp6988_unit_env
      # Unit ENV IV
      - source: temperature_bmp280_unit_env
      - source: temperature_sht40_unit_env
      # Unit ENV Pro
#      - source: temperature_bme688
      # Unit CO2
      - source: temperature_scd40_unit_co2
    on_value: 
      then:
        - lvgl.label.update:
            id:
              - lbl_temp_local_value
            text:
              format: "%.1f"
              args: [ 'x' ]

  - id: !extend humidity_local
    sources:
      # Base BTC
      - source: humidity_sht30_base_btc
      # HAT ENV III
#      - source: humidity_sht30_hat_env
      # Unit ENV III
#      - source: humidity_sht30_unit_env
      # Unit ENV IV
      - source: humidity_sht40_unit_env
      # Unit ENV Pro
#      - source: humidity_bme688
      # Unit CO2
      - source: humidity_scd40_unit_co2

  - id: !extend pressure_local
    sources:
      # HAT ENV III
#      - source: pressure_qmp6988_hat_env
      # Unit ENV III
#      - source: pressure_qmp6988_unit_env
      # Unit ENV IV
      - source: pressure_bmp280_unit_env
      # Unit ENV Pro
#      - source: pressure_bme688

  # extend sensors to update lvgl
  - id: !extend unit_co2_scd40_sensor
    co2:
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_co2_value
              text:
                format: "%.0f"
                args: [ 'x' ]
  - id: !extend pmsx003_sensor
    pm_1_0:
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_pm1_value
              text:
                format: "%.1f"
                args: [ 'x' ]
    pm_2_5:
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_pm25_value
              text:
                format: "%.1f"
                args: [ 'x' ]
    pm_10_0:
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_pm10_value
              text:
                format: "%.1f"
                args: [ 'x' ]

  - id: !extend cc1101_rssi
    on_value:
      - then:
          - lvgl.label.update:
              id: lbl_rssi_value
              text:
                format: "%.0f"
                args: [ 'x' ]
  - id: !extend cc1101_lqi
    on_value:
      - then:
          - lvgl.label.update:
              id: lbl_lqi_value
              text:
                format: "%.0f"
                args: [ 'x' ]
          - lvgl.label.update:
              id: lbl_cc1101_state
              text: "Mottar"
          - lvgl.label.update:
              id: lbl_cc1101_packet
              text: "Pakke"
          - lvgl.led.update:
              id: led_cc1101_state
              color: c_blue
          - delay: 2s
          - lvgl.label.update:
              id: lbl_cc1101_state
              text: "Mottar..."
          - lvgl.label.update:
              id: lbl_cc1101_packet
              text: " "
          - lvgl.led.update:
              id: led_cc1101_state
              color: c_green
# extend select to update lvgl
select:
  - id: !extend cc1101_modulation_type
    on_value:
      - then:
          - lvgl.label.update:
              id: lbl_modulation_value
              text:
                format: "%s"
                args: [ 'x' ]
# extend number to update lvgl
number:
  - id: !extend cc1101_frequency
    on_value:
      - then:
          - lvgl.label.update:
              id: lbl_frequency_value
              text:
                format: "%.2f"
                args: [ 'x' ]
# extend switch to update lvgl
switch:
  - id: !extend cc1101_rx
    on_turn_on:
      - then:
          - lvgl.label.update:
              id: lbl_cc1101_state
              text: "Mottar..."
          - lvgl.led.update:
              id: led_cc1101_state
              color: c_green
    on_turn_off:
      - then:
          - lvgl.label.update:
              id: lbl_cc1101_state
              text: "Av"
          - lvgl.led.update:
              id: led_cc1101_state
              color: c_red
# extend button to update lvgl
button:
  - id: !extend cc1101_idle
    on_press:
      - then:
          - lvgl.label.update:
              id: lbl_cc1101_state
              text: "Stopper"
          - lvgl.led.update:
              id: led_cc1101_state
              color: c_yellow
