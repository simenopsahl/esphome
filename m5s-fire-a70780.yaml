packages:
  # --- COMMON PACKAGES ---
  <<: !include_dir_named common
#  <<: !include_dir_named bluetooth

  # --- BOARD AND MODULES ---
  board: !include board/m5stack_fire.yaml
  mbus_i2c: !include board/extension/mbus_i2c.yaml
#  grove_i2c: !include board/extension/grove_i2c.yaml
  mbus_uart: !include board/extension/mbus_uart.yaml
  cc1101: !include board/module/module_cc1101.yaml
  air_quality: !include board/module/module_air_quality.yaml
  base_btc: !include board/module/base_btc.yaml
  env_iv: !include board/module/unit_env_iv.yaml
  co2: !include board/module/unit_co2.yaml

  # --- GUI PACKAGES ---
  colors: !include gui/themes/colors_night_owl.yaml
  lvgl: !include gui/240x320.yaml

  # --- FEATURE PACKAGES ---
  combined_env_sensors: !include features/combined_env_sensors.yaml

  # --- LVGL WIDGET PACKAGES ---
  room_temperature_widget_sensors: !include { file: gui/widgets/labels/number_sensor.yaml, vars: {
    uid: room_temp_value,
    entity_id: sensor.t22_temperature
  }}

substitutions:
  common:
    log_level: WARN
#    log_baud_rate: "115200"
  device:
    name: m5s-fire-a70780
    location: "Storage"
    framework:
      type: esp-idf
  module:
    env_i2c_bus: i2c_mbus
    co2_i2c_bus: i2c_mbus
    internal:
      i2c_bus: i2c_mbus
  display:
    home_page: page_cc1101

esphome:
  comment: ${device.model} @ ${device.location}
  name: ${device.name}
  friendly_name: ${device.name}
  area: ${device.location}

wifi:
#  use_address: 192.168.69.69
  use_address: m5s-fire-a70780.local
  manual_ip: 
    gateway: 192.168.68.1
    subnet: 255.255.252.0
    static_ip: 192.168.71.43

# --- LVGL CLOCKS ---
time:
  - id: !extend time_homeassistant
    on_time_sync:
      - script.execute: lvgl_time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: lvgl_time_update

lvgl:
  buffer_size: 40%
  pages:
    - id: page_airq
      pad_top: 32
      pad_bottom: 32
      on_load:
        - lvgl.label.update:
            id: lbl_page_title
            text: Luftkvalitet
      <<: !include
        file: gui/functions/swipe_navigation.yaml
